name: Cleanup Orphaned Resources

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
    - cron: '0 0 * * 0'    # Weekly full cleanup on Sunday
  workflow_dispatch:

env:
  TF_VERSION: "1.10.5"

jobs:
  cleanup-orphans:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Install Hetzner CLI
        run: |
          HCLOUD_VERSION=$(curl -s https://api.github.com/repos/hetznercloud/cli/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          curl -fsSL "https://github.com/hetznercloud/cli/releases/download/v${HCLOUD_VERSION}/hcloud-linux-amd64.tar.gz" | tar -xz
          sudo mv hcloud /usr/local/bin/
          hcloud version

      - name: Find and Cleanup Orphaned Resources
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          echo "Checking for orphaned cloud-bench resources..."
          
          # Find servers older than 2 hours with cloud-bench prefix
          CUTOFF_TIME=$(date -u -d '2 hours ago' +%Y-%m-%dT%H:%M:%SZ)
          
          # Get all servers with cloud-bench in the name
          SERVERS=$(hcloud server list -o json | jq -r '.[] | select(.name | contains("cloud-bench")) | "\(.id)|\(.name)|\(.created)"')
          
          ORPHAN_COUNT=0
          while IFS='|' read -r id name created; do
            if [[ -n "$id" ]]; then
              # Compare creation time
              if [[ "$created" < "$CUTOFF_TIME" ]]; then
                echo "[ORPHAN] Found orphaned server: $name (ID: $id, created: $created)"
                echo "Deleting..."
                hcloud server delete "$id" || echo "Failed to delete $id, may already be gone"
                ((ORPHAN_COUNT++))
              else
                echo "[OK] Server $name is recent (created: $created), keeping"
              fi
            fi
          done <<< "$SERVERS"
          
          # Cleanup orphaned SSH keys
          echo "Checking for orphaned SSH keys..."
          KEYS=$(hcloud ssh-key list -o json | jq -r '.[] | select(.name | contains("cloud-bench")) | "\(.id)|\(.name)|\(.created)"')
          
          while IFS='|' read -r id name created; do
            if [[ -n "$id" ]]; then
              if [[ "$created" < "$CUTOFF_TIME" ]]; then
                echo "[ORPHAN] Found orphaned SSH key: $name (ID: $id)"
                hcloud ssh-key delete "$id" || echo "Failed to delete key $id"
                ((ORPHAN_COUNT++))
              fi
            fi
          done <<< "$KEYS"
          
          # Cleanup orphaned firewalls
          echo "Checking for orphaned firewalls..."
          FIREWALLS=$(hcloud firewall list -o json | jq -r '.[] | select(.name | contains("cloud-bench")) | "\(.id)|\(.name)"')
          
          while IFS='|' read -r id name; do
            if [[ -n "$id" ]]; then
              # Check if firewall is attached to any servers
              ATTACHED=$(hcloud firewall describe "$id" -o json | jq '.applied_to | length')
              if [[ "$ATTACHED" == "0" ]]; then
                echo "[ORPHAN] Found unattached firewall: $name (ID: $id)"
                hcloud firewall delete "$id" || echo "Failed to delete firewall $id"
                ((ORPHAN_COUNT++))
              fi
            fi
          done <<< "$FIREWALLS"
          
          echo "========================================"
          echo "Cleanup complete. Removed $ORPHAN_COUNT orphaned resources."
          
          if [[ $ORPHAN_COUNT -gt 0 ]]; then
            echo "::warning::Found and removed $ORPHAN_COUNT orphaned resources. Check workflow logs for details."
          fi

      - name: Summary
        run: |
          echo "## Orphaned Resource Cleanup" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Checked for resources older than 2 hours with 'cloud-bench' prefix." >> $GITHUB_STEP_SUMMARY
          echo "See job logs for details on any removed resources." >> $GITHUB_STEP_SUMMARY
