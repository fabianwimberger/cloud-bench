name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  TF_VERSION: "1.10.5"
  NODE_VERSION: "22.14.0"
  PYTHON_VERSION: "3.13"

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

  ansible:
    name: Ansible
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: pip install ansible

      - name: Ansible Syntax Check
        working-directory: ansible
        run: |
          echo "[localhost]" > inventory.ini
          echo "localhost ansible_connection=local" >> inventory.ini
          ansible-playbook --syntax-check -i inventory.ini playbooks/benchmark.yml

  python:
    name: Python
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: |
          pip install -r scripts/requirements.txt
          pip install -r tests/requirements-test.txt
          pip install ruff mypy types-PyYAML types-requests

      - name: Lint with ruff
        run: ruff check scripts/ tests/

      - name: Format check with ruff
        run: ruff format --check scripts/ tests/

      - name: Type check with mypy
        run: mypy scripts/ --ignore-missing-imports

      - name: Run tests
        run: pytest tests/ -v --tb=short

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - working-directory: frontend
        run: npm ci

      - working-directory: frontend
        run: npm run build

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
          limit-severities-for-sarif: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Check Python dependencies
        run: |
          pip install safety
          safety check -r scripts/requirements.txt -r tests/requirements-test.txt || {
            echo "::error::Python security vulnerabilities detected. Review and update dependencies."
            exit 1
          }

      - name: Check npm dependencies
        working-directory: frontend
        run: npm audit --audit-level=high

  integration:
    name: Integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [terraform, ansible, python, frontend, security]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: |
          pip install -r scripts/requirements.txt
          pip install -r tests/requirements-test.txt
          cd frontend && npm ci && cd ..

      - name: Create Mock Results (Hetzner)
        run: |
          mkdir -p results
          cat > results/cx23-mock.json << 'MOCKEOF'
          {
            "run_id": "test-mock",
            "timestamp": "2026-01-01T00:00:00Z",
            "system": {
              "provider": "hetzner",
              "instance_type": "cx23"
            },
            "provider_attributes": {
              "arch": "x86_64",
              "os": "Ubuntu 24.04",
              "kernel": "6.8.0",
              "vcpu": 2,
              "memory_mb": 4096,
              "hostname": "test-cx23"
            },
            "cpu": {
              "test": "sysbench-cpu",
              "runs": 5,
              "single_thread_events": 350,
              "multi_thread_events": 700,
              "threads": 2
            },
            "memory": {
              "test": "sysbench-memory",
              "runs": 5,
              "read_mib_per_sec": 8500,
              "write_mib_per_sec": 6500,
              "total_throughput_mib": 15000
            },
            "disk": {
              "test": "fio-randread",
              "runs": 5,
              "read_iops": 15000
            }
          }
          MOCKEOF

          cat > results/cax11-mock.json << 'MOCKEOF'
          {
            "run_id": "test-mock",
            "timestamp": "2026-01-01T00:00:00Z",
            "system": {
              "provider": "hetzner",
              "instance_type": "cax11"
            },
            "provider_attributes": {
              "arch": "aarch64",
              "os": "Ubuntu 24.04",
              "kernel": "6.8.0",
              "vcpu": 2,
              "memory_mb": 4096,
              "hostname": "test-cax11"
            },
            "cpu": {
              "test": "sysbench-cpu",
              "runs": 5,
              "single_thread_events": 600,
              "multi_thread_events": 1200,
              "threads": 2
            },
            "memory": {
              "test": "sysbench-memory",
              "runs": 5,
              "read_mib_per_sec": 5000,
              "write_mib_per_sec": 4000,
              "total_throughput_mib": 9000
            },
            "disk": {
              "test": "fio-randread",
              "runs": 5,
              "read_iops": 18000
            }
          }
          MOCKEOF

      - name: Test Result Processing (Hetzner)
        run: |
          python3 scripts/process_results.py \
            --input results/ \
            --output frontend/public/data/ \
            --config config/instances.yaml \
            --region fsn1 \
            --provider hetzner

      - name: Verify Hetzner Output Files
        run: |
          for f in benchmark-data.json benchmark-results.csv summary.md manifest.json; do
            test -f "frontend/public/data/$f" || (echo "$f missing" && exit 1)
          done
          python3 -c "import json; json.load(open('frontend/public/data/benchmark-data.json'))"

      - name: Create Mock Results (AWS)
        run: |
          rm -f results/*.json
          cat > results/t3.medium-mock.json << 'MOCKEOF'
          {
            "run_id": "test-mock-aws",
            "timestamp": "2026-01-01T00:00:00Z",
            "system": {
              "provider": "aws",
              "instance_type": "t3.medium"
            },
            "provider_attributes": {
              "arch": "x86_64",
              "os": "Ubuntu 24.04",
              "kernel": "6.8.0",
              "vcpu": 2,
              "memory_mb": 4096,
              "ebs_optimized": true,
              "burstable": true,
              "baseline_cpu": 20
            },
            "cpu": {
              "test": "sysbench-cpu",
              "runs": 5,
              "single_thread_events": 400,
              "multi_thread_events": 800,
              "threads": 2
            },
            "memory": {
              "test": "sysbench-memory",
              "runs": 5,
              "read_mib_per_sec": 7000,
              "write_mib_per_sec": 5500,
              "total_throughput_mib": 12500
            },
            "disk": {
              "test": "fio-randread",
              "runs": 5,
              "read_iops": 16000
            }
          }
          MOCKEOF

      - name: Test Result Processing (AWS)
        run: |
          mkdir -p frontend/public/data-aws/
          python3 scripts/process_results.py \
            --input results/ \
            --output frontend/public/data-aws/ \
            --config config/instances.yaml \
            --region eu-central-1 \
            --provider aws

      - name: Verify AWS Output Files
        run: |
          for f in benchmark-data.json benchmark-results.csv summary.md; do
            test -f "frontend/public/data-aws/$f" || (echo "$f missing" && exit 1)
          done
          # Verify currency is USD
          python3 -c "
          import json
          data = json.load(open('frontend/public/data-aws/benchmark-data.json'))
          assert data['metadata']['currency'] == 'USD', f'Expected USD, got {data[\"metadata\"][\"currency\"]}'
          print('AWS currency check passed: USD')
          "

      - name: Build Frontend with Real Data
        working-directory: frontend
        run: npm run build
