name: Run Benchmarks

on:
  workflow_dispatch:
    inputs:
      provider:
        description: 'Cloud provider'
        required: true
        default: 'hetzner'
        type: choice
        options:
          - hetzner
          - aws

      instances:
        description: 'Instance IDs (comma-separated, or "all")'
        required: true
        default: 'all'

      default_region:
        description: 'Region (empty = auto-detect: fsn1 for hetzner, eu-central-1 for aws)'
        required: false
        default: ''
        type: string

      instance_regions:
        description: 'Instance-specific regions (JSON: {"cx23":"nbg1"})'
        required: false
        default: '{}'

      skip_cost_guard:
        description: 'Skip cost estimation (not recommended)'
        type: boolean
        default: false

concurrency:
  group: benchmark
  cancel-in-progress: true

env:
  TF_VERSION: "1.10.5"
  ANSIBLE_VERSION: "11.4.0"
  NODE_VERSION: "22.14.0"
  PYTHON_VERSION: "3.13"
  RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  cost-guard:
    if: ${{ !inputs.skip_cost_guard }}
    uses: ./.github/workflows/cost-guard.yml
    with:
      provider: ${{ github.event.inputs.provider }}
      instances: ${{ github.event.inputs.instances }}
  provision:
    needs: [cost-guard]
    if: ${{ always() && (needs.cost-guard.result == 'success' || inputs.skip_cost_guard) }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      runner_ip: ${{ steps.get_ip.outputs.ip }}
      instances_arg: ${{ steps.instances.outputs.arg }}
      ssh_key_b64: ${{ steps.export_key.outputs.key_b64 }}
      ssh_pub_key: ${{ steps.export_key.outputs.pub_key }}
      region: ${{ steps.resolve_region.outputs.region }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve Region
        id: resolve_region
        run: |
          REGION="${{ github.event.inputs.default_region }}"
          if [ -z "$REGION" ]; then
            case "${{ github.event.inputs.provider }}" in
              hetzner) REGION="fsn1" ;;
              aws)     REGION="eu-central-1" ;;
            esac
          fi
          echo "region=$REGION" >> $GITHUB_OUTPUT
          echo "Resolved region: $REGION"

      - name: Validate Inputs
        env:
          TOKEN_SET: ${{ secrets.HCLOUD_TOKEN != '' }}
          AWS_KEY_SET: ${{ secrets.AWS_ACCESS_KEY_ID != '' }}
          INSTANCE_REGIONS: ${{ github.event.inputs.instance_regions }}
        run: |
          if [ "${{ github.event.inputs.provider }}" = "hetzner" ] && [ "$TOKEN_SET" != "true" ]; then
            echo "::error::HCLOUD_TOKEN secret is required for Hetzner"
            exit 1
          fi
          if [ "${{ github.event.inputs.provider }}" = "aws" ] && [ "$AWS_KEY_SET" != "true" ]; then
            echo "::error::AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY secrets are required for AWS"
            exit 1
          fi
          if [ -n "$INSTANCE_REGIONS" ] && [ "$INSTANCE_REGIONS" != "{}" ]; then
            if ! echo "$INSTANCE_REGIONS" | jq empty 2>/dev/null; then
              echo "::error::instance_regions must be valid JSON"
              exit 1
            fi
          fi

      - name: Get Runner Public IP
        id: get_ip
        run: |
          # Get the current GitHub Actions runner's public IP with fallback services
          IP_SERVICES=(
            "https://api.ipify.org"
            "https://icanhazip.com"
            "https://ifconfig.me"
            "https://ipecho.net/plain"
          )

          RUNNER_IP=""
          for service in "${IP_SERVICES[@]}"; do
            echo "Trying $service..."
            RUNNER_IP=$(curl -s --max-time 5 "$service" 2>/dev/null) && break
            echo "  Failed, trying next service..."
          done

          if [ -z "$RUNNER_IP" ]; then
            echo "::error::Failed to detect runner IP address from any service"
            exit 1
          fi

          # Validate IP format
          if ! [[ "$RUNNER_IP" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid IP format: $RUNNER_IP"
            exit 1
          fi

          echo "ip=${RUNNER_IP}" >> $GITHUB_OUTPUT
          echo "Runner IP: ${RUNNER_IP}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Generate SSH Key Pair
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t ed25519 -f ~/.ssh/cloud_bench -N "" -C "cloud-bench@github-actions"
          chmod 600 ~/.ssh/cloud_bench
          echo "SSH_PRIVATE_KEY_FILE=~/.ssh/cloud_bench" >> $GITHUB_ENV

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Determine Instances
        id: instances
        run: |
          INSTANCES_ARG=$(./scripts/parse-instances.sh "${{ github.event.inputs.instances }}")
          if [ $? -ne 0 ]; then
            echo "::error::Invalid instance IDs: only alphanumeric characters, hyphens, underscores, dots, and commas are allowed"
            exit 1
          fi
          echo "arg=$INSTANCES_ARG" >> $GITHUB_OUTPUT

      - name: Terraform Apply
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          terraform apply -auto-approve \
            -var="run_id=${{ env.RUN_ID }}" \
            -var="cloud_provider=${{ github.event.inputs.provider }}" \
            -var="enabled_instances=${{ steps.instances.outputs.arg }}" \
            -var="default_region=${{ steps.resolve_region.outputs.region }}" \
            -var="instance_regions=${{ github.event.inputs.instance_regions }}" \
            -var="hcloud_token=${{ secrets.HCLOUD_TOKEN || 'unused' }}" \
            -var="aws_access_key_id=${{ secrets.AWS_ACCESS_KEY_ID || '' }}" \
            -var="aws_secret_access_key=${{ secrets.AWS_SECRET_ACCESS_KEY || '' }}" \
            -var="ssh_public_key_path=~/.ssh/cloud_bench.pub" \
            -var="allowed_ssh_ips=[\"${{ steps.get_ip.outputs.ip }}/32\"]" \
            -var="os_image=${{ vars.OS_IMAGE || 'ubuntu-24.04' }}"

      - name: Generate Ansible Inventory
        working-directory: terraform
        run: |
          terraform output -raw ansible_inventory > ../ansible/inventory.ini

      - name: Upload Terraform State
        uses: actions/upload-artifact@v7
        with:
          name: terraform-state
          path: terraform/terraform.tfstate
          retention-days: 1

      - name: Upload Ansible Inventory
        uses: actions/upload-artifact@v7
        with:
          name: ansible-inventory
          path: ansible/inventory.ini
          retention-days: 1

      - name: Export SSH Key to Job Output
        id: export_key
        run: |
          # Encode key to base64 for safe passing between jobs
          echo "key_b64=$(base64 -w 0 ~/.ssh/cloud_bench)" >> $GITHUB_OUTPUT
          echo "pub_key=$(cat ~/.ssh/cloud_bench.pub)" >> $GITHUB_OUTPUT

  benchmark:
    needs: provision
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Download Ansible Inventory
        uses: actions/download-artifact@v8
        with:
          name: ansible-inventory

      - name: Setup SSH Key
        env:
          SSH_KEY_B64: ${{ needs.provision.outputs.ssh_key_b64 }}
          SSH_PUB_KEY: ${{ needs.provision.outputs.ssh_pub_key }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY_B64" | base64 -d > ~/.ssh/cloud_bench
          chmod 600 ~/.ssh/cloud_bench
          echo "$SSH_PUB_KEY" > ~/.ssh/cloud_bench.pub
          chmod 644 ~/.ssh/cloud_bench.pub

      - name: Update AWS Security Groups with Runner IP
        if: ${{ github.event.inputs.provider == 'aws' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ needs.provision.outputs.region }}
        run: |
          RUNNER_IP=$(curl -s --retry 3 https://ifconfig.me || curl -s --retry 3 https://api.ipify.org)
          echo "Benchmark runner IP: $RUNNER_IP"
          PREV_IP="${{ needs.provision.outputs.runner_ip }}"
          echo "Provision runner IP: $PREV_IP"
          if [ "$RUNNER_IP" = "$PREV_IP" ]; then
            echo "Same IP, no update needed"
            exit 0
          fi
          # Find all cloud-bench security groups and authorize the new runner IP
          SG_IDS=$(aws ec2 describe-security-groups \
            --filters "Name=tag:project,Values=cloud-bench" "Name=tag:run_id,Values=${{ env.RUN_ID }}" \
            --query "SecurityGroups[].GroupId" --output text)
          for sg in $SG_IDS; do
            echo "Authorizing $RUNNER_IP/32 on $sg"
            aws ec2 authorize-security-group-ingress --group-id "$sg" \
              --protocol tcp --port 22 --cidr "$RUNNER_IP/32" || true
            aws ec2 authorize-security-group-ingress --group-id "$sg" \
              --protocol icmp --port -1 --cidr "$RUNNER_IP/32" || true
          done

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '${{ env.PYTHON_VERSION }}'

      - name: Install Ansible
        run: |
          pip install ansible==${{ env.ANSIBLE_VERSION }}

      - name: Wait for instances to be ready
        run: |
          for i in $(seq 1 10); do
            echo "Attempt $i: Checking SSH connectivity..."
            if ansible all -i inventory.ini -m raw -a "echo ready" \
              --private-key ~/.ssh/cloud_bench \
              -e "ansible_python_interpreter=auto" \
              --ssh-common-args="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" 2>/dev/null | grep -q "ready"; then
              echo "All instances are ready!"
              exit 0
            fi
            sleep 5
          done
          echo "::error::Instances did not become ready in time"
          exit 1

      - name: Run Ansible Playbook
        working-directory: ansible
        run: |
          export RUN_ID="${{ env.RUN_ID }}"
          export ANSIBLE_HOST_KEY_CHECKING=False
          ansible-playbook -i ../inventory.ini playbooks/benchmark.yml \
            --private-key ~/.ssh/cloud_bench \
            --extra-vars "run_id=${{ env.RUN_ID }}" \
            -vv

      - name: Upload Raw Results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-raw-results
          path: ansible/results/*.json
          retention-days: 30

  process:
    needs: [provision, benchmark]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    outputs:
      summary: ${{ steps.summary.outputs.content }}
    steps:
      - uses: actions/checkout@v6

      - name: Download Results
        uses: actions/download-artifact@v8
        with:
          name: benchmark-raw-results
          path: results/

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '${{ env.PYTHON_VERSION }}'

      - name: Process Results
        run: |
          pip install -r scripts/requirements.txt
          python scripts/process_results.py \
            --input results/ \
            --output frontend/public/data/ \
            --config config/instances.yaml \
            --region "${{ needs.provision.outputs.region }}" \
            --provider "${{ github.event.inputs.provider }}"

      - name: Generate Summary
        id: summary
        run: |
          delimiter="$(openssl rand -hex 8)"
          echo "content<<${delimiter}" >> $GITHUB_OUTPUT
          cat frontend/public/data/summary.md >> $GITHUB_OUTPUT
          echo "${delimiter}" >> $GITHUB_OUTPUT

      - name: Upload Processed Results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-processed
          path: frontend/public/data/
          retention-days: 90

      - name: Persist Results to Data Branch
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H%M%S)
          PROVIDER="${{ github.event.inputs.provider }}"
          REGION="${{ needs.provision.outputs.region }}"
          RUN_DIR="data/runs/${TIMESTAMP}-${PROVIDER}-${REGION}"

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Save processed results and scripts before switching branches
          cp -r frontend/public/data/ /tmp/processed-results/
          cp -r results/ /tmp/raw-results/ 2>/dev/null || true
          cp scripts/update_manifest.py /tmp/update_manifest.py

          # Fetch the data branch (create if missing)
          if git fetch origin benchmark-data:benchmark-data 2>/dev/null; then
            git checkout benchmark-data
          else
            git checkout --orphan benchmark-data
            git rm -rf . 2>/dev/null || true
            mkdir -p data
            echo '{"schema_version":"3.0","runs":[],"instance_index":{}}' > data/manifest.json
            git add data/manifest.json
            git commit -m "init: benchmark-data branch"
          fi

          # Write run data
          mkdir -p "$RUN_DIR/raw"
          cp /tmp/raw-results/*.json "$RUN_DIR/raw/" 2>/dev/null || true

          # Find the summary and detail files (timestamped filenames)
          SUMMARY_FILE=$(ls /tmp/processed-results/summary-*.json 2>/dev/null | head -1)
          DETAIL_FILE=$(ls /tmp/processed-results/detail-*.json 2>/dev/null | head -1)
          if [ -n "$SUMMARY_FILE" ]; then
            cp "$SUMMARY_FILE" "$RUN_DIR/summary.json"
          fi
          if [ -n "$DETAIL_FILE" ]; then
            cp "$DETAIL_FILE" "$RUN_DIR/detail.json"
          fi

          # Update manifest
          pip install pyyaml
          python /tmp/update_manifest.py \
            --manifest data/manifest.json \
            --run-dir "$RUN_DIR" \
            --provider "$PROVIDER" \
            --region "$REGION" \
            --timestamp "$TIMESTAMP"

          # Commit and push
          git add data/
          git commit -m "benchmark: ${PROVIDER} ${REGION} ${TIMESTAMP}" || echo "No changes to commit"
          git push origin benchmark-data

          # Switch back
          git checkout main 2>/dev/null || true

  cleanup:
    needs: [provision, benchmark, process]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Get Runner Public IP
        id: get_ip
        run: |
          # Get the current GitHub Actions runner's public IP with fallback services
          IP_SERVICES=(
            "https://api.ipify.org"
            "https://icanhazip.com"
            "https://ifconfig.me"
            "https://ipecho.net/plain"
          )

          RUNNER_IP=""
          for service in "${IP_SERVICES[@]}"; do
            echo "Trying $service..."
            RUNNER_IP=$(curl -s --max-time 5 "$service" 2>/dev/null) && break
            echo "  Failed, trying next service..."
          done

          if [ -z "$RUNNER_IP" ]; then
            echo "::error::Failed to detect runner IP address from any service"
            exit 1
          fi

          echo "ip=${RUNNER_IP}" >> $GITHUB_OUTPUT
          echo "Runner IP for cleanup: ${RUNNER_IP}"

      - name: Download Terraform State
        uses: actions/download-artifact@v8
        with:
          name: terraform-state
          path: terraform/

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Destroy
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          terraform destroy -auto-approve \
            -var="run_id=${{ env.RUN_ID }}" \
            -var="cloud_provider=${{ github.event.inputs.provider }}" \
            -var="enabled_instances=${{ needs.provision.outputs.instances_arg }}" \
            -var="default_region=${{ needs.provision.outputs.region }}" \
            -var="instance_regions=${{ github.event.inputs.instance_regions }}" \
            -var="hcloud_token=${{ secrets.HCLOUD_TOKEN || 'unused' }}" \
            -var="aws_access_key_id=${{ secrets.AWS_ACCESS_KEY_ID || '' }}" \
            -var="aws_secret_access_key=${{ secrets.AWS_SECRET_ACCESS_KEY || '' }}" \
            -var="ssh_public_key_path=/dev/null" \
            -var="allowed_ssh_ips=[\"${{ steps.get_ip.outputs.ip }}/32\"]" \
            -var="os_image=${{ vars.OS_IMAGE || 'ubuntu-24.04' }}"

      - name: Verify Cleanup
        if: always()
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ needs.provision.outputs.region }}
        run: |
          echo "Verifying cleanup..."

          if [ "${{ github.event.inputs.provider }}" = "hetzner" ]; then
            # Install hcloud CLI
            HCLOUD_VERSION="1.61.0"
            HCLOUD_SHA256="86da8a0bbff6d56ca39041e4594c2af3b50baf0971526a67669639a213b51936"
            HCLOUD_URL="https://github.com/hetznercloud/cli/releases/download/v${HCLOUD_VERSION}/hcloud-linux-amd64.tar.gz"
            curl -fsSL "$HCLOUD_URL" -o hcloud-linux-amd64.tar.gz
            echo "${HCLOUD_SHA256}  hcloud-linux-amd64.tar.gz" | sha256sum -c -
            if [ $? -ne 0 ]; then
              echo "::error::SHA256 checksum verification failed for hcloud CLI"
              rm -f hcloud-linux-amd64.tar.gz
              exit 1
            fi
            tar -xzf hcloud-linux-amd64.tar.gz
            rm -f hcloud-linux-amd64.tar.gz

            # Check for remaining resources with this run_id
            SERVERS=$(./hcloud server list -o json | jq -r ".[] | select(.name | contains(\"${{ env.RUN_ID }}\")) | .name")

            if [[ -n "$SERVERS" ]]; then
              echo "::error::CRITICAL: Servers still exist after cleanup:"
              echo "$SERVERS"
              echo "Manual intervention required!"
              exit 1
            else
              echo "[OK] All resources cleaned up successfully"
            fi

          elif [ "${{ github.event.inputs.provider }}" = "aws" ]; then
            INSTANCES=$(aws ec2 describe-instances \
              --filters "Name=tag:project,Values=cloud-bench" "Name=tag:run_id,Values=${{ env.RUN_ID }}" \
              --query 'Reservations[].Instances[?State.Name!=`terminated`].InstanceId' \
              --output text 2>/dev/null || echo "")

            if [[ -n "$INSTANCES" && "$INSTANCES" != "None" ]]; then
              echo "::error::CRITICAL: AWS instances still exist after cleanup:"
              echo "$INSTANCES"
              echo "Manual intervention required!"
              exit 1
            else
              echo "[OK] All AWS resources cleaned up successfully"
            fi
          fi

  deploy:
    needs: process
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '${{ env.PYTHON_VERSION }}'

      - name: Fetch benchmark data from data branch
        run: |
          git fetch origin benchmark-data || echo "No benchmark-data branch yet"
          if git rev-parse origin/benchmark-data >/dev/null 2>&1; then
            git checkout origin/benchmark-data -- data/ 2>/dev/null || true
            if [ -d data ]; then
              cp -r data/ frontend/public/data/
            fi
          fi

      - name: Build history file
        run: |
          pip install -r scripts/requirements.txt
          if [ -f frontend/public/data/manifest.json ]; then
            python scripts/build_history.py \
              --data-dir frontend/public/data/ \
              --output frontend/public/data/history.json
          fi

      - name: Download Processed Results
        uses: actions/download-artifact@v8
        with:
          name: benchmark-processed
          path: frontend/public/data/

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '${{ env.NODE_VERSION }}'

      - name: Build Frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Upload GitHub Pages Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  summary:
    needs: [provision, process, cleanup]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Post Results Summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const summary = `${{ needs.process.outputs.summary }}`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Benchmark Results\n\n**Provider**: ${{ github.event.inputs.provider }}\n**Region**: ${{ needs.provision.outputs.region }}\n\n${summary}`
            });

      - name: Job Summary
        run: |
          echo "## Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Run ID**: ${{ env.RUN_ID }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Provider**: ${{ github.event.inputs.provider }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Region**: ${{ needs.provision.outputs.region }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Instances**: ${{ github.event.inputs.instances }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View detailed results at: https://${{ github.repository_owner }}.github.io/cloud-bench/" >> $GITHUB_STEP_SUMMARY
