name: Deploy UI

on:
  workflow_dispatch:

env:
  NODE_VERSION: "22.14.0"
  PYTHON_VERSION: "3.13"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
      actions: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '${{ env.PYTHON_VERSION }}'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch benchmark data from data branch
        run: |
          git fetch origin benchmark-data || echo "No benchmark-data branch yet"
          if git rev-parse origin/benchmark-data >/dev/null 2>&1; then
            git checkout origin/benchmark-data -- data/ 2>/dev/null || true
            if [ -d data ]; then
              cp -r data/ frontend/public/data/
            fi
          fi

      - name: Build combined data
        run: |
          if [ -f frontend/public/data/manifest.json ]; then
            python scripts/merge_summaries.py \
              --manifest frontend/public/data/manifest.json \
              --data-dir frontend/public/data/ \
              --output frontend/public/data/benchmark-data.json
            python scripts/build_history.py \
              --data-dir frontend/public/data/ \
              --output frontend/public/data/history.json
          else
            echo "::warning::No benchmark data available"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '${{ env.NODE_VERSION }}'

      - name: Build Frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Upload GitHub Pages Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
