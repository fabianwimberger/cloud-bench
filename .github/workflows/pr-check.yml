name: PR Check

on:
  pull_request:
    paths:
      - 'terraform/**'
      - 'config/**'
      - '.github/workflows/**'

env:
  TF_VERSION: "1.10.5"

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan (Dry Run)
        id: plan
        working-directory: terraform
        run: |
          # Run plan with dummy token - validates config structure, provider schema
          # Provider will fail auth but that's expected; we catch actual config errors
          set -o pipefail
          terraform plan \
            -var="run_id=pr-${{ github.event.pull_request.number }}" \
            -var="hcloud_token=dummy-token-for-validation-only" \
            -var='allowed_ssh_ips=["10.0.0.1/32"]' \
            -input=false 2>&1 | tee plan_output.txt || {
            # Exit code 1 is expected (invalid token), exit code >1 indicates real errors
            exit_code=$?
            if [ $exit_code -gt 1 ]; then
              echo "::error::Terraform plan failed with unexpected error (exit code: $exit_code)"
              cat plan_output.txt
              exit $exit_code
            fi
            echo "::warning::Provider authentication failed (expected for dummy token). Plan validated otherwise."
          }

      - name: Comment Plan on PR
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan_output.txt', 'utf8');
            const body = `## Terraform Plan\n\n\`\`\`\n${plan.substring(0, 6000)}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
